alpaca:
  paper: true

account:
  starting_capital: 500.0
  max_position_pct: 0.25            # Reduced from 0.30 — tighter for $500 account
  max_risk_per_trade_pct: 0.02
  daily_loss_limit_pct: 0.05
  max_open_positions: 5

pdt:
  max_day_trades: 3
  day_trade_reserve: 1
  min_conviction_for_day_trade: 0.80

scanner:
  min_price: 1.00                      # Raised from 2.00 — sub-$5 stocks halt constantly and have huge spreads
  max_price: 50.00
  min_avg_volume: 500000
  min_relative_volume: 1.5
  min_gap_pct: 2.0
  max_candidates: 20
  options_universe:
    min_price: 10.0
    max_price: 500.0
    min_avg_volume: 1000000
    max_candidates: 30

strategies:
  mean_reversion:
    enabled: true
    rsi_period: 14
    rsi_oversold: 38                # Loosened from 35 — was generating 0 trades
    rsi_exit: 55
    atr_stop_multiplier: 1.5
    atr_tp_multiplier: 3.5          # Wider target for better R:R
    hold_type: swing
    lookback_days: 30

  momentum:
    enabled: true
    volume_spike_multiplier: 2.0    # Raised from 1.5 — reduces false breakout signals
    breakout_lookback: 20
    atr_stop_multiplier: 1.5
    atr_tp_multiplier: 3.5          # Wider target for better R:R
    hold_type: adaptive
    min_adr_pct: 2.0

  vwap:
    enabled: true
    hold_type: day
    entry_deviation_pct: 0.5
    exit_deviation_pct: 0.3

  ema_crossover:
    enabled: true
    fast_period: 9
    slow_period: 20
    trend_period: 50
    rsi_min: 50
    rsi_max: 70                         # Tightened from 75 — avoid overbought entries
    atr_stop_multiplier: 1.5
    atr_tp_multiplier: 3.0
    hold_type: swing

  macd_divergence:
    enabled: true
    lookback_bars: 20
    atr_stop_multiplier: 1.8
    atr_tp_multiplier: 3.5              # Wider target for better R:R
    hold_type: swing

  bb_squeeze:
    enabled: true
    squeeze_lookback: 5
    min_relative_volume: 1.5            # Raised from 1.3 — stronger volume confirmation
    atr_tp_multiplier: 3.5
    hold_type: adaptive

  orb:
    enabled: true
    opening_range_minutes: 30
    min_volume_ratio: 1.5
    min_range_pct: 0.3                  # Minimum opening range width as % of price
    hold_type: day

  pullback:
    enabled: true
    pullback_tolerance_pct: 0.75        # Tightened from 1.0 — must be closer to EMA
    rsi_min: 40
    rsi_max: 53                         # Tightened from 55 — more clearly pulled back
    atr_stop_multiplier: 0.5
    atr_tp_multiplier: 3.0              # Raised from 2.5 — better R:R
    hold_type: swing

  # ── Options Strategies ──────────────────────────────────
  credit_put_spread:
    enabled: true
    target_delta: 0.25              # Reduced from 0.30 — ~75% PoP instead of 70%
    min_dte: 20
    max_dte: 45
    max_spread_width: 1.50          # Reduced from 2.50 — max loss $150 not $250
    min_credit_pct: 0.30
    max_risk: 100.0                 # Hard cap: max loss $100 per trade (20% of $500)

  debit_call_spread:
    enabled: true
    long_delta: 0.60
    short_delta: 0.35
    min_dte: 30
    max_dte: 60
    max_debit_pct: 0.50             # Reduced from 0.60 — better breakeven probability

  long_call:
    enabled: true
    target_delta: 0.60
    min_dte: 20
    max_dte: 60
    max_contract_cost: 75.0
    max_iv_percentile: 1.00         # Raised from 0.70 — let cost cap handle it

  long_put:
    enabled: true
    target_delta: 0.55
    min_dte: 20
    max_dte: 60
    max_contract_cost: 75.0
    breakdown_lookback: 10          # Reduced from 20 — less restrictive breakdown

  cash_secured_put:
    enabled: true
    target_delta: 0.20              # Reduced from 0.25 — ~80% PoP, safer on $500
    min_dte: 20
    max_dte: 45
    min_annualized_return: 0.15
    max_stock_price: 3.00           # Reduced from 5.00 — max collateral $300 not $500

  momentum_options:
    enabled: true
    min_dte: 5                      # Raised from 2 — avoids pure theta-burn lottery tickets
    max_dte: 20
    min_delta: 0.25                 # Raised from 0.15 — better odds of profiting
    max_delta: 0.45
    max_contract_cost: 75.0         # Reduced from 100 — 15% of account cap
    min_relative_volume: 2.0        # Raised from 1.5 — stronger confirmation
    breakout_lookback: 20
    min_roi_pct: 0.30               # Raised from 0.25 — higher bar for short-DTE bets

  covered_call:
    enabled: true
    target_delta: 0.30
    min_dte: 20
    max_dte: 45
    min_annualized_return: 0.12
    max_stock_price: 3.00           # Reduced from 5.00 — 100 shares = $300 max

  covered_straddle:
    enabled: false                  # Disabled — requires $600-1000 capital (impossible on $500)
    min_dte: 20
    max_dte: 45
    max_stock_price: 3.00
    min_total_credit_pct: 0.06      # Raised from 0.04 — require 6% premium to justify risk
    max_bb_width: 0.06              # Tightened from 0.10 — truly range-bound only

sentiment:
  enabled: true
  news_lookback_hours: 36
  news_max_articles: 10
  min_conviction_after_mods: 0.45       # Raised from 0.35 — post-regime/news conviction floor
  block_on_bearish_news: -0.5

options:
  enabled: true
  max_options_positions: 3
  max_options_capital_pct: 0.50
  max_single_options_risk_pct: 0.12

strategy_weighting:
  enabled: true
  min_weight: 0.3
  max_weight: 2.0
  burn_in_trades: 10
  recalc_interval_trades: 5
  recency_halflife_trades: 20

risk:
  stop_loss_pct: 0.03
  trailing_stop_pct: 0.04
  take_profit_pct: 0.06
  position_sizing: fractional
  kelly_fraction: 0.25
  max_portfolio_heat_pct: 0.06
  min_conviction_for_swing: 0.55       # Minimum conviction for swing trades (post-weighting)

schedule:
  premarket_scan: "09:00"
  market_open: "09:30"
  scan_interval_minutes: 15            # Scan & evaluate every 15 min (9:45 AM - 3:45 PM)
  options_expiry_check: "15:30"
  eod_close_day_trades: "15:50"
  eod_review: "16:05"
